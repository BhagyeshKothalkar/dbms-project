services:
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: dbms_password
      POSTGRES_USER: admin
      POSTGRES_DB: dbms
    volumes:
      - ./sql_commands:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d dbms" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: dbms_password
      DB_NAME: dbms
      DB_PORT: 5432
